<!DOCTYPE html>
<html>
<head>
    <title>Display Example</title>
    <style>
        .box1 {
            background: lightblue;
            display: block;      
            padding: 10px;
            margin-bottom: 10px;
        }

        .box2 {
            background: lightgreen;
            display: inline;     
            padding: 10px;
        }

        .box3 {
            background: lightpink;
            display: inline-block; 
            padding: 10px;
            width: 150px;
        }

    </style>
</head>
<body>

<h2>CSS Display Property Example</h2>
<div class="box1">This is display: block</div>
<span class="box2">display: inline</span>
<span class="box2">inline</span>
<div class="box3">display: inline-block</div>
<br><br>
<div class="box3">inline-block</div></body></html>
</body>
</html>
