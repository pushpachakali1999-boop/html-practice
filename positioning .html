<!DOCTYPE html>
<html>
<head>
    <title>Positioning </title>
    <style>
        .box {
            width: 150px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid blue;
            margin: 10px;
            
        }

}
        
        .static-box {
            position: static; 
        }

        
        .relative-box {
            position: relative;
            top: 20px; 
            left: 20px;
            background-color: lightgreen;
        }

        
        .absolute-box {
            position: absolute;
            top: 50px;
            left: 200px;
            background-color: orange;
        }

        
        .fixed-box {
            position: fixed;
            bottom: 10px;
            right: 20px;
            background-color: pink;
        }
</style>
<body>

    <h2>CSS Positioning Example</h2>

    <div class="box static-box">Static Position</div>

    <div class="box relative-box">Relative Position</div>

    <div class="box absolute-box">Absolute Position</div>

    <div class="box fixed-box">Fixed Position</div>

</body>
</head>
</html>
