<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow in JavaScript</title>
</head>
<body>
    <h2>Button Click </h2>
<button id="btn">Click Me</button>
    <p id="result">Count: 0</p>
    
        <style>
        button{ 
            background-color: black;
            color: aliceblue;
        
        }
        h2{
            color: blue;
            text-shadow: 0cqmin; 
        }
        </style>
        <script>
        let count = 0;
 document.getElementById("btn").addEventListener("click", () => {
            count++;
            document.getElementById("result").innerText = "Count: " + count;
        });
        
        
    </script>    
</body>
</html>
