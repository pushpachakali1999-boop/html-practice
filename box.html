<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box with html and css</title>
    <style>
        .box1 {
            padding: 50px;            
            border: solid blue; 
            border-radius: 500px;
            border-top-left-radius: 100px;
            column-width: 20;
                       
        }
        .box2{
            padding: 50px;
            border: solid blue;
            border-radius: 500px;
            border-bottom-left-radius: 100px;
            column-width: 20;
            
            
        }
        .box3{
            padding: 50px;
            border: solid blue;
            border-radius: 500px;
            border-top-right-radius: 100px;table-striped
            column-width: 20;
            
            
            
        }
        div{
            display: inline-block;
            width:200px;
            height:400px;
            margin: 20px; 
            
        }
        p{
            padding: 20px;
        }

    </style>
</head>
<body>

    <h2>CSS Box Example</h2>

    <div class="box1">
       <p>This is a simple box with a blue color.</p>
    </div>
    <div class="box2">
        <p> This is a html.</p>
    </div>
    <div class="box3">
       <p> this is a Css page.</p>
    </div>

</body>
</html>
